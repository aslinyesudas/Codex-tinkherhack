<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>SafeRoute — Live Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:#ff2d2d; --green:#00ff88; --amber:#ffb703;
      --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24;
      --border:rgba(255,255,255,0.07);
      --text:#e8e8f0; --text-dim:rgba(232,232,240,0.45);
      --font-head:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace;
    }
    html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-mono); overflow:hidden; }

    .bg-grid {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
      background-size:40px 40px;
    }

    /* TOPBAR */
    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 20px;
      background:rgba(10,10,15,0.95); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .logo-wrap { display:flex; flex-direction:column; }
    .logo-row  { display:flex; align-items:center; gap:8px; }
    .logo-icon { color:var(--red); font-size:16px; display:inline-block; animation:spin 8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .logo-text { font-family:var(--font-head); font-weight:800; font-size:16px; }
    .logo-sub  { font-size:8px; color:var(--text-dim); letter-spacing:0.15em; margin-top:2px; }

    .badge {
      display:flex; align-items:center; gap:7px;
      padding:5px 12px; border-radius:100px; font-size:10px; letter-spacing:0.12em;
      transition:all 0.4s;
    }
    .badge.waiting { background:var(--bg3); border:1px solid var(--border); color:var(--text-dim); }
    .badge.live    { background:rgba(255,45,45,0.15); border:1px solid var(--red); color:var(--red); }
    .badge.ended   { background:rgba(0,255,136,0.1); border:1px solid var(--green); color:var(--green); }
    .badge-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
    .badge.live .badge-dot { animation:blink 1s step-end infinite; }
    @keyframes blink { 50%{opacity:0} }

    /* MAP */
    #map { position:fixed; top:57px; left:0; right:0; bottom:0; z-index:1; }
    .leaflet-tile { filter:brightness(0.55) saturate(0.3) hue-rotate(180deg) invert(1); }
    .leaflet-container { background:#1a1a2e; }

    /* PANEL */
    .panel {
      position:fixed; bottom:0; left:0; right:0; z-index:900;
      background:rgba(10,10,15,0.97); backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      padding:14px 20px 28px;
      transition:transform 0.4s ease;
    }
    .panel.collapsed { transform:translateY(calc(100% - 48px)); }
    .panel-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; cursor:pointer; }

    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .info-block { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:12px; }
    .info-label { font-size:9px; letter-spacing:0.15em; color:var(--text-dim); margin-bottom:5px; }
    .info-value { font-size:15px; }
    .info-value.red   { color:var(--red);   font-family:var(--font-head); font-weight:700; }
    .info-value.green { color:var(--green); }

    .trail-row { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
    .trail-row::-webkit-scrollbar { display:none; }
    .trail-chip {
      flex-shrink:0; background:var(--bg3); border:1px solid var(--border);
      border-radius:6px; padding:6px 10px; font-size:10px; color:var(--text-dim); white-space:nowrap;
    }
    .trail-chip.latest { border-color:rgba(255,45,45,0.4); color:var(--red); }

    .waiting-msg { text-align:center; padding:30px 20px; }
    .waiting-msg h2 { font-family:var(--font-head); font-size:20px; margin-bottom:10px; }
    .waiting-msg p  { font-size:12px; color:var(--text-dim); line-height:1.8; }

    /* MARKERS */
    .live-dot  { width:18px; height:18px; border-radius:50%; background:var(--red); animation:livePulse 1.5s ease-out infinite; }
    .crumb-dot { width:8px;  height:8px;  border-radius:50%; background:rgba(255,45,45,0.5); border:1px solid var(--red); }
    @keyframes livePulse {
      0%  { box-shadow:0 0 0 0 rgba(255,45,45,0.7); }
      70% { box-shadow:0 0 0 18px rgba(255,45,45,0); }
      100%{ box-shadow:0 0 0 0 rgba(255,45,45,0); }
    }
    .hidden { display:none !important; }
  </style>
</head>
<body>
<div class="bg-grid"></div>

<header class="topbar">
  <div class="logo-wrap">
    <div class="logo-row"><span class="logo-icon">◈</span><span class="logo-text">SafeRoute</span></div>
    <div class="logo-sub">LIVE TRACKER</div>
  </div>
  <div class="badge waiting" id="badge"><span class="badge-dot"></span><span id="badgeText">WAITING</span></div>
</header>

<div id="map"></div>

<div class="panel" id="panel">
  <div class="panel-handle" id="handle"></div>

  <div id="waitingMsg" class="waiting-msg">
    <h2>Waiting for SOS…</h2>
    <p>When someone triggers SafeRoute SOS<br>and shares this link, their live location<br>appears here automatically.</p>
  </div>

  <div id="sessionInfo" class="hidden">
    <div class="info-grid">
      <div class="info-block">
        <div class="info-label">SESSION</div>
        <div class="info-value red" id="infoSession">—</div>
      </div>
      <div class="info-block">
        <div class="info-label">BREADCRUMBS</div>
        <div class="info-value red" id="infoCrumbs">0</div>
      </div>
      <div class="info-block">
        <div class="info-label">LAST SEEN</div>
        <div class="info-value" id="infoLastSeen">—</div>
      </div>
      <div class="info-block">
        <div class="info-label">ACCURACY</div>
        <div class="info-value green" id="infoAccuracy">—</div>
      </div>
    </div>
    <div style="font-size:9px;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:8px">BREADCRUMB TRAIL</div>
    <div class="trail-row" id="trailRow"></div>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://zyhdkxjvsdtwdrqporxd.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5aGRreGp2c2R0d2RycXBvcnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDg5ODYsImV4cCI6MjA4Nzc4NDk4Nn0.iHDscPuVNTr0yxbjILlKGsDXjrLJUYvLaa3zVr9gT_k';
  const TABLE         = 'sos_alerts';
  const POLL_MS       = 4000;

  let sessionId   = new URLSearchParams(location.search).get('session');
  let markers     = [];
  let polyline    = null;
  let liveMarker  = null;
  let panelOpen   = true;

  // MAP
  const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([20,0], 3);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.control.zoom({ position:'topright' }).addTo(map);

  // ICONS
  const liveIcon  = L.divIcon({ className:'', html:'<div class="live-dot"></div>',  iconSize:[18,18], iconAnchor:[9,9] });
  const crumbIcon = L.divIcon({ className:'', html:'<div class="crumb-dot"></div>', iconSize:[8,8],   iconAnchor:[4,4] });

  // FETCH
  async function fetchCrumbs(sid) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?session_id=eq.${sid}&order=created_at.asc`, {
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function fetchLatest() {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?order=created_at.desc&limit=1`, {
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    if (!r.ok) return null;
    const d = await r.json();
    return d[0]?.session_id || null;
  }

  // RENDER MAP
  function renderMap(data) {
    if (!data.length) return;
    markers.forEach(m => map.removeLayer(m)); markers = [];
    if (polyline)    { map.removeLayer(polyline);    polyline = null; }
    if (liveMarker)  { map.removeLayer(liveMarker);  liveMarker = null; }

    const lls = data.map(d => [d.latitude, d.longitude]);
    polyline = L.polyline(lls, { color:'#ff2d2d', weight:2, opacity:0.5, dashArray:'4 6' }).addTo(map);

    data.slice(0,-1).forEach(d => {
      const m = L.marker([d.latitude, d.longitude], { icon: crumbIcon }).addTo(map);
      markers.push(m);
    });

    const last = data[data.length-1];
    liveMarker = L.marker([last.latitude, last.longitude], { icon: liveIcon })
      .bindPopup(`<b style="font-family:monospace;font-size:11px">${last.session_id}</b><br>${last.latitude.toFixed(5)}, ${last.longitude.toFixed(5)}`)
      .addTo(map);
    markers.push(liveMarker);

    map.flyTo([last.latitude, last.longitude], Math.max(map.getZoom(), 15), { duration:1.2 });
  }

  // UPDATE UI
  function updateUI(data) {
    if (!data.length) return;
    const last     = data[data.length-1];
    const secsAgo  = Math.round((Date.now() - new Date(last.created_at).getTime()) / 1000);
    const isLive   = secsAgo < 300;

    const badge = document.getElementById('badge');
    badge.className = 'badge ' + (isLive ? 'live' : 'ended');
    document.getElementById('badgeText').textContent = isLive ? 'LIVE' : 'ENDED';

    document.getElementById('waitingMsg').style.display  = 'none';
    document.getElementById('sessionInfo').style.display = 'block';
    document.getElementById('infoSession').textContent   = data[0].session_id;
    document.getElementById('infoCrumbs').textContent    = data.length;
    document.getElementById('infoLastSeen').textContent  = secsAgo < 60 ? `${secsAgo}s ago` : new Date(last.created_at).toLocaleTimeString();
    document.getElementById('infoAccuracy').textContent  = last.accuracy ? `±${Math.round(last.accuracy)}m` : '—';

    document.getElementById('trailRow').innerHTML = [...data].reverse().slice(0,10).map((d,i) => `
      <div class="trail-chip ${i===0?'latest':''}">
        ${i===0?'◉ ':''}${d.latitude.toFixed(4)}, ${d.longitude.toFixed(4)}
        <div style="font-size:8px;opacity:0.6;margin-top:2px">${new Date(d.created_at).toLocaleTimeString()}</div>
      </div>`).join('');
  }

  // POLL
  async function poll() {
    try {
      if (!sessionId) {
        sessionId = await fetchLatest();
        if (!sessionId) return;
        history.replaceState({}, '', `?session=${sessionId}`);
      }
      const data = await fetchCrumbs(sessionId);
      if (data.length) { renderMap(data); updateUI(data); }
    } catch(e) { console.error('[Tracker]', e); }
  }

  // PANEL TOGGLE
  document.getElementById('handle').addEventListener('click', () => {
    panelOpen = !panelOpen;
    document.getElementById('panel').classList.toggle('collapsed', !panelOpen);
  });

  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
