<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SafeRoute — Emergency SOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-pulse" id="bgPulse"></div>

  <header class="topbar">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">SafeRoute</span>
    </div>
    <div class="status-chip" id="statusChip">
      <span class="status-dot"></span>
      <span id="statusText">STANDBY</span>
    </div>
  </header>

  <main class="app-container">

    <!-- Location Card -->
    <div class="card location-card">
      <div class="card-label">YOUR LOCATION</div>
      <div class="coords-display">
        <div class="coord-row">
          <span class="coord-label">LAT</span>
          <span class="coord-value" id="latDisplay">---.------</span>
        </div>
        <div class="coord-row">
          <span class="coord-label">LNG</span>
          <span class="coord-value" id="lngDisplay">---.------</span>
        </div>
        <div class="coord-row">
          <span class="coord-label">ACC</span>
          <span class="coord-value" id="accDisplay">--- m</span>
        </div>
      </div>
      <div class="gps-status" id="gpsStatus">
        <span class="pulse-ring"></span>
        <span id="gpsStatusText">Acquiring GPS…</span>
      </div>
    </div>

    <!-- SOS Button -->
    <div class="sos-wrapper">
      <div class="sos-ring sos-ring-3"></div>
      <div class="sos-ring sos-ring-2"></div>
      <div class="sos-ring sos-ring-1"></div>
      <button class="sos-btn" id="sosBtn" aria-label="Trigger SOS">
        <span class="sos-label" id="sosBtnLabel">SOS</span>
        <span class="sos-sublabel" id="sosBtnSub">HOLD 2s TO ACTIVATE</span>
        <svg class="sos-progress" viewBox="0 0 200 200" id="sosProgressSvg">
          <circle cx="100" cy="100" r="88" />
        </svg>
      </button>
    </div>

    <!-- Broadcast Card -->
    <div class="broadcast-card hidden" id="broadcastCard">
      <div class="card-label">BROADCASTING</div>
      <div class="timer-display">
        <span id="timerCount">60</span>
        <span class="timer-unit">sec</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="reason-display" id="reasonDisplay"></div>
      <div class="crumb-meta">
        <div class="crumb-count">
          <span class="crumb-icon">◉</span>
          <span id="crumbCount">0</span> breadcrumbs sent
        </div>
        <button class="share-link-btn" id="shareLinkBtn">📤 Share Tracker</button>
      </div>
      <div class="notif-log" id="notifLog"></div>
    </div>

    <!-- Contacts -->
    <div class="contacts-section">
      <div class="section-label">EMERGENCY CONTACTS</div>
      <div class="contacts-list" id="contactsList"></div>
      <button class="add-contact-btn" id="addContactBtn">+ Add Contact</button>
    </div>

    <!-- History -->
    <div class="card history-card">
      <div class="card-label">RECENT SESSIONS</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No sessions yet</div>
      </div>
    </div>

  </main>

  <!-- Stop Bar -->
  <div class="stop-bar hidden" id="stopBar">
    <button class="stop-btn" id="stopBtn">■ STOP BROADCAST</button>
    <div class="session-id-display">SESSION <span id="sessionIdDisplay">—</span></div>
  </div>

  <!-- Reason Picker Modal -->
  <div class="modal-overlay hidden" id="reasonOverlay">
    <div class="modal reason-modal">
      <div class="modal-title">⚠️ WHY ARE YOU SENDING THIS ALERT?</div>
      <div class="reason-grid">
        <button class="reason-btn" data-reason="🆘 I am in serious danger!">🆘 Serious Danger</button>
        <button class="reason-btn" data-reason="😰 I might be in trouble">😰 Might Be Trouble</button>
        <button class="reason-btn" data-reason="🚨 I need help urgently">🚨 Need Help Now</button>
        <button class="reason-btn" data-reason="✅ I am safe, sharing location">✅ I Am Safe</button>
        <button class="reason-btn" data-reason="📍 Just sharing my location">📍 Sharing Location</button>
        <button class="reason-btn" data-reason="🏥 I need medical help">🏥 Medical Help</button>
      </div>
      <input class="modal-input" type="text" id="customReason" placeholder="Or type a custom message… (optional)" maxlength="120" style="margin-top:12px" />
      <div class="modal-actions" style="margin-top:12px">
        <button class="modal-btn cancel" id="reasonCancel">CANCEL</button>
        <button class="modal-btn confirm" id="reasonConfirm">ACTIVATE SOS →</button>
      </div>
    </div>
  </div>

  <!-- Add Contact Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">ADD EMERGENCY CONTACT</div>
      <input class="modal-input" type="text"  id="contactName"  placeholder="Full Name" />
      <input class="modal-input" type="tel"   id="contactPhone" placeholder="Phone with country code e.g. +919876543210" />
      <input class="modal-input" type="email" id="contactEmail" placeholder="Email address (for auto-notification)" />
      <div class="modal-actions">
        <button class="modal-btn cancel"  id="modalCancel">CANCEL</button>
        <button class="modal-btn confirm" id="modalConfirm">SAVE CONTACT</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
